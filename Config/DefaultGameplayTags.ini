[/Script/GameplayTags.GameplayTagsSettings]
ImportTagsFromConfig=True
WarnOnInvalidTags=True
FastReplication=True
InvalidTagCharacters="\"\',"
NumBitsForContainerSize=6
NetIndexFirstBitSegment=16

; ============ 输入标签 - 原生动作（InputTags for Native Actions） ============
; 参考 Lyra：通过 InputConfig DataAsset 查找 InputAction
+GameplayTagList=(Tag="InputTag.Move",DevComment="移动输入标签 → IA_Move")
+GameplayTagList=(Tag="InputTag.Look",DevComment="手柄视角输入标签 → IA_Look")
+GameplayTagList=(Tag="InputTag.LookMouse",DevComment="鼠标视角输入标签 → IA_MouseLook")
+GameplayTagList=(Tag="InputTag.Jump",DevComment="跳跃输入标签 → IA_Jump")

; ============ 输入标签 - 技能动作 ============
; 映射到 EnhancedInput Action，通过 ASC 路由到对应技能
+GameplayTagList=(Tag="Input.Ability.Q",DevComment="Q 键测试技能输入标签")

; ============ 技能类型标签 ============
+GameplayTagList=(Tag="Ability.Type.Action",DevComment="主动技能类型")

; ============ 初始化状态标签（参考 Lyra InitState） ============
+GameplayTagList=(Tag="InitState.Spawned",DevComment="1: Actor/Component 已出生，可被扩展")
+GameplayTagList=(Tag="InitState.DataAvailable",DevComment="2: 所需数据已加载/复制，可开始初始化")
+GameplayTagList=(Tag="InitState.DataInitialized",DevComment="3: 数据已初始化，但尚未准备好完整玩法")
+GameplayTagList=(Tag="InitState.GameplayReady",DevComment="4: 完全就绪，可开始游玩")

; ============ 移动控制标签 ============
; ASC 拥有此标签时角色不能移动/旋转（技能效果可用）
+GameplayTagList=(Tag="Gameplay.MovementStopped",DevComment="禁止移动（被定身/眩晕时由 GE 添加）")

; ============ 状态标签（参考 Lyra Status Tags） ============
+GameplayTagList=(Tag="Status.Death",DevComment="角色死亡状态")
+GameplayTagList=(Tag="Status.Death.Dying",DevComment="正在死亡（HealthComponent 设置）")
+GameplayTagList=(Tag="Status.Death.Dead",DevComment="已死亡（HealthComponent 设置）")

; ============ GameplayEvent 标签（参考 Lyra） ============
+GameplayTagList=(Tag="GameplayEvent.Death",DevComment="死亡事件 → 触发 GA_Death 技能")

; ============ 技能行为标签（参考 Lyra） ============
+GameplayTagList=(Tag="Ability.Behavior.SurvivesDeath",DevComment="带有此标签的技能不会因死亡被取消")

; ============ GameplayCue 标签 ============
+GameplayTagList=(Tag="GameplayCue.Character.DamageTaken",DevComment="受到伤害时触发的 GameplayCue")
+GameplayTagList=(Tag="GameplayCue.Character.Heal",DevComment="受到治疗时触发的 GameplayCue")

; ============ GameplayEffect 标签 ============
+GameplayTagList=(Tag="GameplayEffect.Damage",DevComment="伤害效果标签")
+GameplayTagList=(Tag="GameplayEffect.Heal",DevComment="治疗效果标签")

; ============ 游戏阶段标签（参考 Lyra ShooterCoreTags） ============
; GamePhaseSubsystem 通过 GameplayTag 层级自动管理阶段互斥：
;   父阶段可共存（GamePhase.Playing + GamePhase.Playing.WarmUp ✅）
;   兄弟阶段互斥（WarmUp → SuddenDeath 自动取消前者）
+GameplayTagList=(Tag="GamePhase.PreGame",DevComment="等待玩家加入阶段")
+GameplayTagList=(Tag="GamePhase.WarmUp",DevComment="热身体验阶段（在 Playing 之前）")
+GameplayTagList=(Tag="GamePhase.Playing",DevComment="正式游戏阶段")
+GameplayTagList=(Tag="GamePhase.Playing.SuddenDeath",DevComment="突然死亡子阶段（取消 WarmUp 等子阶段）")
+GameplayTagList=(Tag="GamePhase.PostGame",DevComment="游戏结算阶段")
